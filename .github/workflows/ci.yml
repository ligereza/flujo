name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install
        run: |
          py -m pip install -e .
          py -m pip install pytest

      - name: Health
        run: py -m flujo health

      - name: Tests
        run: py -m pytest tests/ -q --tb=no
