<g id="contenido_texto">
<text class="txt" x="185" y="768" fill="#EF7B2D" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Descripción</text>
<text class="txt" x="185" y="847" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">Pre Fiesta es un suplemento en gomitas formulado para</text>
<text class="txt" x="185" y="898.06" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">preparar tu cuerpo antes de que llegue la exigencia física,</text>
<text class="txt" x="185" y="949.1199999999999" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">mental y/o social.</text>
<text class="txt" x="185" y="1032.1799999999998" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">Con vitaminas C y complejo B, taurina, L-teanina y extracto</text>
<text class="txt" x="185" y="1083.2399999999998" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">de rhodiola — activos que apoyan el metabolismo</text>
<text class="txt" x="185" y="1134.2999999999997" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">energético, la función neuromuscular, la claridad mental y</text>
<text class="txt" x="185" y="1185.3599999999997" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">la respuesta al estrés.</text>
<text class="txt" x="185" y="1268.4199999999996" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">Porque cuidarse antes también cuenta.</text>
<text class="txt" x="1505" y="768" fill="#EF7B2D" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Nutrientes</text>
<text x="1505" y="845" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1547" y="845" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Vitamina C y complejo B (B1, B6, B12): contribuyen al metabolismo</text>
<text class="txt" x="1547" y="885.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">energético normal y al funcionamiento del sistema nervioso.</text>
<text x="1505" y="961.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1547" y="961.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Taurina: aminoácido involucrado en múltiples procesos fisiológicos,</text>
<text class="txt" x="1547" y="1001.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">incluyendo la función muscular y neurológica.</text>
<text x="1505" y="1077.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1547" y="1077.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">L-teanina: asociada a estados de relajación sin sedación.</text>
<text x="1505" y="1152.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1547" y="1152.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Rhodiola: adaptógeno de uso tradicional en contextos de fatiga y</text>
<text class="txt" x="1547" y="1193.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">estrés.</text>
</g>
