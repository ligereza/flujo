<g id="contenido_texto">
<text class="txt" x="185" y="768" fill="#315EE8" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Descripción</text>
<text class="txt" x="185" y="847" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">Suplemento alimenticio en gomitas con Cafeína y</text>
<text class="txt" x="185" y="898.06" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">L-teanina, la combinación más respaldada para lograr foco</text>
<text class="txt" x="185" y="949.1199999999999" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">sostenido sin el nerviosismo que genera la cafeína por sí</text>
<text class="txt" x="185" y="1000.1799999999998" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">sola.</text>
<text class="txt" x="185" y="1083.2399999999998" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">Producto diseñado específicamente para momentos de alta</text>
<text class="txt" x="185" y="1134.2999999999997" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">demanda cognitiva, que busca ser una alternativa</text>
<text class="txt" x="185" y="1185.3599999999997" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">comprobada para afrontar el estudio, trabajo o jornadas</text>
<text class="txt" x="185" y="1236.4199999999996" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">prolongadas.</text>
<text class="txt" x="1505" y="768" fill="#315EE8" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Nutrientes</text>
<text x="1505" y="848" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="33" font-weight="700">•</text>
<text class="txt" x="1547" y="848" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="33" font-weight="400">Cafeína anhidra: contribuye al estado de alerta y a la</text>
<text class="txt" x="1547" y="892.55" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="33" font-weight="400">concentración.</text>
<text x="1505" y="972.0999999999999" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="33" font-weight="700">•</text>
<text class="txt" x="1547" y="972.0999999999999" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="33" font-weight="400">L-teanina: aminoácido asociado a estados de relajación sin</text>
<text class="txt" x="1547" y="1016.6499999999999" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="33" font-weight="400">sedación.</text>
<text x="1505" y="1096.1999999999998" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="33" font-weight="700">•</text>
<text class="txt" x="1547" y="1096.1999999999998" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="33" font-weight="400">Vitamina B12: contribuye al funcionamiento normal del</text>
<text class="txt" x="1547" y="1140.7499999999998" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="33" font-weight="400">sistema nervioso y al metabolismo energético.</text>
</g>
