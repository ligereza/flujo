<g id="contenido_texto">
<text class="txt" x="185" y="768" fill="#7650D8" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Descripción</text>
<text class="txt" x="185" y="847" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">Suplemento alimenticio en gomitas con tres hongos</text>
<text class="txt" x="185" y="898.06" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">funcionales — Cordyceps, Melena de León y Reishi — más</text>
<text class="txt" x="185" y="949.1199999999999" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">L-teanina y vitamina B12.</text>
<text class="txt" x="185" y="1032.1799999999998" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">Fórmula diseñada para acompañar procesos de regulación</text>
<text class="txt" x="185" y="1083.2399999999998" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">y adaptación al estrés, desde un enfoque natural y</text>
<text class="txt" x="185" y="1134.2999999999997" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">funcional, para quienes buscan apoyo en rutinas exigentes.</text>
<text class="txt" x="1505" y="768" fill="#7650D8" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Nutrientes</text>
<text x="1505" y="845" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1547" y="845" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Cordyceps: hongo tradicionalmente asociado a energía y vitalidad.</text>
<text x="1505" y="920.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1547" y="920.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Melena de León (Hericium erinaceus): relacionado con funciones</text>
<text class="txt" x="1547" y="961.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">cognitivas y salud neuronal.</text>
<text x="1505" y="1036.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1547" y="1036.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Reishi: utilizado tradicionalmente en contextos de adaptación al</text>
<text class="txt" x="1547" y="1077.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">estrés.</text>
<text x="1505" y="1152.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1547" y="1152.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">L-teanina: aminoácido asociado a estados de relajación sin sedación.</text>
<text x="1505" y="1228.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1547" y="1228.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Vitamina B12: contribuye al funcionamiento normal del sistema</text>
<text class="txt" x="1547" y="1268.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">nervioso y al metabolismo energético.</text>
</g>
