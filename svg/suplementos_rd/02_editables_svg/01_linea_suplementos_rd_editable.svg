<g id="contenido_texto">
<text class="txt" x="175" y="740" fill="#F5C54D" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="35" font-weight="700">Descripción</text>
<text class="txt" x="175" y="816" fill="#FFFFFF" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">Suplementos alimenticios</text>
<text class="txt" x="175" y="868" fill="#FFFFFF" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">desarrollados por Reduciendo Daño</text>
<text class="txt" x="175" y="920" fill="#FFFFFF" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">para acompañar al organismo desde</text>
<text class="txt" x="175" y="972" fill="#FFFFFF" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">una perspectiva de reducción de</text>
<text class="txt" x="175" y="1024" fill="#FFFFFF" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">daños.</text>
<text class="txt" x="175" y="1118" fill="#FFFFFF" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">Cada producto tiene un perfil</text>
<text class="txt" x="175" y="1170" fill="#FFFFFF" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">diferenciado de nutrientes, pensado</text>
<text class="txt" x="175" y="1222" fill="#FFFFFF" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">para contextos concretos de la vida</text>
<text class="txt" x="175" y="1274" fill="#FFFFFF" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">cotidiana.</text>
<text class="txt" x="1030" y="658" fill="#173F2F" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Productos</text>
<text x="1030" y="730" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1064" y="730" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Pre Fiesta: Apoya el metabolismo energético y la respuesta al estrés antes de situaciones de alta</text>
<text class="txt" x="1064" y="770" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">demanda. Vitaminas, Taurina, L-teanina y Rhodiola.</text>
<text x="1030" y="827" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1064" y="827" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Post Fiesta: Complementa la recuperación nutricional tras contextos de alta exigencia fisiológica.</text>
<text class="txt" x="1064" y="867" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Electrolitos, vitaminas, NAC, cardo mariano y CoQ10.</text>
<text x="1030" y="924" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1064" y="924" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Impulso: Contribuye al estado de alerta y la concentración en actividades que requieren foco</text>
<text class="txt" x="1064" y="964" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">sostenido, sin el nerviosismo que genera la cafeína por sí sola. Cafeína, L-teanina y vitamina B12.</text>
<text x="1030" y="1021" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1064" y="1021" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Hongos Adaptógenos: Acompaña procesos de regulación y bienestar en rutinas exigentes.</text>
<text class="txt" x="1064" y="1061" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Cordyceps, melena de león, reishi, L-teanina y vitamina B12.</text>
<text x="1030" y="1118" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1064" y="1118" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Citrato y Bisglicinato de Magnesio: Complementa la ingesta diaria de magnesio, mineral esencial</text>
<text class="txt" x="1064" y="1158" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">para el sistema nervioso, la función muscular y el metabolismo energético.</text>
<text x="1030" y="1215" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1064" y="1215" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Creatina: La molécula más estudiada en suplementación nutricional, involucrada en la producción</text>
<text class="txt" x="1064" y="1255" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">de energía celular. Disponible en polvo (1 kg) y en gomitas.</text>
<text x="1030" y="1312" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1064" y="1312" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Proteína: Suplemento en polvo de proteína de suero de leche para apoyar la recuperación</text>
<text class="txt" x="1064" y="1352" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">muscular y el aporte proteico diario.</text>
</g>
