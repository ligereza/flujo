<g id="contenido_texto">
<text class="txt" x="185" y="768" fill="#9A6B3D" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Descripción</text>
<text class="txt" x="185" y="842" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="32" font-weight="400">Suplemento alimenticio de creatina monohidratada, la molécula más</text>
<text class="txt" x="185" y="886.16" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="32" font-weight="400">estudiada en suplementación nutricional. Involucrada en la</text>
<text class="txt" x="185" y="930.3199999999999" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="32" font-weight="400">producción de energía celular en tejidos de alta demanda como el</text>
<text class="txt" x="185" y="974.4799999999999" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="32" font-weight="400">músculo esquelético y el sistema nervioso.</text>
<text class="txt" x="185" y="1050.6399999999999" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="32" font-weight="400">Disponible en dos formatos para adaptarse a cualquier rutina: polvo</text>
<text class="txt" x="185" y="1094.8" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="32" font-weight="400">para quien prefiere dosificar con precisión, y gomitas para quien</text>
<text class="txt" x="185" y="1138.96" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="32" font-weight="400">busca practicidad sin preparación.</text>
<text class="txt" x="1505" y="768" fill="#9A6B3D" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Formatos disponibles</text>
<text x="1505" y="845" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1547" y="845" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">En polvo — 1 kg: 5 g por porción (1 scoop). Permite ajustar la</text>
<text class="txt" x="1547" y="885.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">dosificación según necesidad. Para su consumo, mezclar en agua u</text>
<text class="txt" x="1547" y="926.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">otro líquido.</text>
<text x="1505" y="1001.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="1547" y="1001.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">En gomitas — 60 gomitas: 5 g por porción (2 gomitas). Formato</text>
<text class="txt" x="1547" y="1042.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">práctico, sin preparación, fácil de incorporar a la rutina diaria.</text>
</g>
