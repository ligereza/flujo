<g id="contenido_texto">
<text class="txt" x="185" y="744" fill="#D95436" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Descripción</text>
<text class="txt" x="185" y="801" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="31" font-weight="400">Suplemento alimenticio en polvo de proteína de suero de leche (whey), diseñado para apoyar la recuperación muscular y complementar el aporte</text>
<text class="txt" x="185" y="842" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="31" font-weight="400">proteico diario.</text>
<text class="txt" x="185" y="903" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="31" font-weight="400">Disponible en dos versiones con distintos perfiles de procesamiento, para adaptarse a diferentes objetivos y tolerancias digestivas.</text>
<text class="txt" x="185" y="1104" fill="#D95436" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Whey Protein (concentrado)</text>
<text class="txt" x="185" y="1169" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="29" font-weight="400">Proteína concentrada de suero de leche con un perfil nutricional completo.</text>
<text class="txt" x="185" y="1208" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="29" font-weight="400">Aporta proteínas, vitaminas y minerales en cada porción, con mayor</text>
<text class="txt" x="185" y="1247" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="29" font-weight="400">contenido de grasas y carbohidratos respecto al aislado. Opción versátil</text>
<text class="txt" x="185" y="1286" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="29" font-weight="400">para quienes buscan apoyar su rutina de entrenamiento o aumentar su</text>
<text class="txt" x="185" y="1325" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="29" font-weight="400">ingesta proteica diaria sin requerimientos dietéticos específicos.</text>
<text class="txt" x="1505" y="1104" fill="#D95436" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Iso Protein (aislado)</text>
<text class="txt" x="1505" y="1169" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="29" font-weight="400">Proteína aislada de suero de leche con mayor porcentaje de proteína por</text>
<text class="txt" x="1505" y="1208" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="29" font-weight="400">porción y mínimo contenido de grasas y lactosa. Proceso de filtración</text>
<text class="txt" x="1505" y="1247" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="29" font-weight="400">adicional que resulta en una fórmula más depurada, orientada a quienes</text>
<text class="txt" x="1505" y="1286" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="29" font-weight="400">buscan optimizar el aporte proteico o tienen sensibilidad a la lactosa.</text>
<text class="txt" x="170" y="1784" fill="#F5C54D" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Modo de uso</text>
<text class="txt" x="490" y="1780" fill="#FFFFFF" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="24" font-weight="400">Mezclar 1 scoop (33 g) en 200 cc de agua o leche. Ingerir inmediatamente. Puede consumirse antes o después del entrenamiento, o en cualquier momento del día como</text>
<text class="txt" x="490" y="1809" fill="#FFFFFF" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="24" font-weight="400">complemento proteico.</text>
</g>
