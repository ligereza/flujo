<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLUJO • Material RD</title>
<style>
  :root {
    --bg: #0a0a0a; --panel: #141414; --panel2: #1a1a1a;
    --border: #2a2a2a; --text: #e8e8e8; --muted: #888;
    --flujo-ink: #1f2a24; --flujo-accent: #2d5a4a; --flujo-paper: #f8f1e3;
    --flujo-support: #675f55; --flujo-alert: #c2410f;
    --accent: #2d5a4a;
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; margin: 0; }
  header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; gap: 12px; align-items: center; }
  header h1 { font-size: 18px; font-weight: 700; }
  .badge { background: var(--flujo-accent); padding: 3px 10px; border-radius: 4px; font-size: 11px; }
  .nav { margin-left: auto; display: flex; gap: 8px; }
  .nav a, .nav button { background: var(--panel2); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; font-size: 12px; text-decoration: none; cursor: pointer; }
  .nav a:hover, .nav button:hover { border-color: var(--accent); }
  .nav .back { font-weight: 600; background: #1f2a24; border-color: #2d5a4a; }
  
  .main { max-width: 1320px; margin: 0 auto; padding: 24px; }
  .toolbar { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px; display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
  .search-box { flex: 1; position: relative; }
  .search-box input { width: 100%; background: var(--panel2); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; border-radius: 5px; font-size: 13px; }
  .search-box input:focus { border-color: var(--accent); outline: none; }
  .filter-btn { background: var(--panel2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); background: rgba(45, 90, 74, .15); }
  .reload-btn { background: linear-gradient(135deg, var(--accent), #1a3f2e); color: #fff; border: none; padding: 8px 16px; font-weight: 700; font-size: 11px; border-radius: 5px; cursor: pointer; text-transform: uppercase; }
  .reload-btn:hover { opacity: .9; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; transition: all .2s; cursor: pointer; }
  .card:hover { border-color: var(--accent); box-shadow: 0 0 16px rgba(45, 90, 74, .2); }
  .card-preview { background: var(--dark4); width: 100%; height: 200px; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 12px; font-size: 11px; color: var(--muted); border: 1px solid var(--border); }
  .card-preview svg, .card-preview img { max-width: 100%; max-height: 100%; }
  .card-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .card-meta { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
  .card-desc { font-size: 12px; color: var(--text); line-height: 1.4; margin-bottom: 10px; }
  .card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn-sm { background: var(--panel2); border: 1px solid var(--border); color: var(--text); padding: 4px 10px; border-radius: 3px; font-size: 11px; cursor: pointer; }
  .btn-sm:hover { border-color: var(--accent); }
  .btn-accent { background: rgba(45, 90, 74, .4); border-color: var(--accent); }

  .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, .7); z-index: 1000; align-items: center; justify-content: center; }
  .modal.active { display: flex; }
  .modal-content { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 24px; max-width: 760px; max-height: 80vh; overflow: auto; position: relative; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: var(--panel2); border: 1px solid var(--border); width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 700; }
  .modal-close:hover { border-color: var(--accent); }
  .modal-img { max-width: 100%; max-height: 500px; border-radius: 6px; border: 1px solid var(--border); }
  .modal-title { font-size: 18px; font-weight: 700; margin-top: 14px; }
  .modal-info { font-size: 12px; color: var(--muted); margin: 8px 0; }

  .section-title { font-size: 14px; font-weight: 700; padding: 16px 24px; margin: 0; border-bottom: 1px solid var(--border); color: var(--accent); }
  .section-title::before { content: "•"; margin-right: 8px; }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty svg { opacity: .3; margin-bottom: 16px; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>FLUJO</h1>
  <span class="badge">Material RD</span>
  <div class="nav">
    <a class="back" href="flujo_hub.html" style="background:#1f2a24;border-color:#2d5a4a">← Hub</a>
    <a href="plano_demo.html">Plano Intervención</a>
  </div>
</header>

<div class="main">
  <div class="toolbar">
    <input id="search" type="text" placeholder="Buscar material (flyer, rider, protocolo, etiqueta...)" class="search-box">
    <input type="hidden" id="filterType" value="">
    <button class="filter-btn" onclick="setFilter('')">Todo</button>
    <button class="filter-btn" onclick="setFilter('flyer')">Flyers</button>
    <button class="filter-btn" onclick="setFilter('rider')">Riders</button>
    <button class="filter-btn" onclick="setFilter('signage')">Señalización</button>
    <button class="filter-btn" onclick="setFilter('suplemento')">Suplementos</button>
    <button class="reload-btn" onclick="reloadData()">Recargar</button>
  </div>

  <div id="container"></div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <div class="modal-close" onclick="closeModal()">×</div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const A = {
  ink: '#1f2a24', accent: '#2d5a4a', paper: '#f8f1e3', support: '#675f55', alert: '#c2410f',
  dark0: '#0a0a0a', dark1: '#0d0d0d', dark2: '#111', dark3: '#151515', dark4: '#1f1f1f'
};

// Datos base (simulado; en producción viendría de backend)
const materials = [
  {
    id: 'flyer-prevencion', category: 'flyer', title: 'Flyer Prevención DGD',
    desc: 'Educativo sobre drogas de diseño. Usos stand informativo principal.',
    meta: '210×297mm | A4 • 2021', tags: ['educación', 'DGD', 'prevención']
  },
  {
    id: 'flyer-testeo', category: 'flyer', title: 'Flyer Testeo Químico',
    desc: 'Info sobre análisis colorimétrico. Distribución en stand testeo.',
    meta: '210×297mm | A4 • 2022', tags: ['testeo', 'químico', 'safety']
  },
  {
    id: 'flyer-alcohol', category: 'flyer', title: 'Flyer Alcohol & Drogas',
    desc: 'Combinaciones de riesgo. Educación general eventos.',
    meta: '210×297mm | A4 • 2022', tags: ['alcohol', 'interacciones']
  },
  {
    id: 'rider-operativo', category: 'rider', title: 'Rider Operativo RD',
    desc: 'Protocolo setup stand + protocolos de atención. Para productoras eventos.',
    meta: '6 págs • PDF • 2023', tags: ['operativo', 'protocolo', 'eventos']
  },
  {
    id: 'rider-testeo', category: 'rider', title: 'Rider Testeo Químico',
    desc: 'Procedimientos testeo, seguridad analista, disposing residuos.',
    meta: '8 págs • PDF • 2023', tags: ['testeo', 'safety', 'procedures']
  },
  {
    id: 'rider-contension', category: 'rider', title: 'Rider Zona Contención',
    desc: 'Protocolos atención crisis emocional, primeros auxilios psicológicos.',
    meta: '5 págs • PDF • 2022', tags: ['contención', 'salud mental', 'crisis']
  },
  {
    id: 'signage-stand', category: 'signage', title: 'Señalización Stand Principal',
    desc: 'Banner + afiches para área stand informativo. Vinilo + cartulina.',
    meta: '1.5×2.0m • Diseño 2023', tags: ['visual', 'stand', 'diseño']
  },
  {
    id: 'signage-testeo', category: 'signage', title: 'Señalización Zona Testeo',
    desc: 'Indicadores para flujo testeo + avisos seguridad. Lamina plastificada.',
    meta: '0.6×0.6m • Avisos varios', tags: ['testeo', 'flow', 'seguridad']
  },
  {
    id: 'signage-contension', category: 'signage', title: 'Señalización Zona Contención',
    desc: 'Señal acceso zona contención + protocolo afiche. Tono calmo/seguro.',
    meta: '0.8×0.5m • Diseño 2023', tags: ['contención', 'acceso', 'protocolo']
  },
  {
    id: 'suplemento-mdma', category: 'suplemento', title: 'Suplemento: MDMA/Éxtasis',
    desc: 'Info: dosis, efectos, riesgos, combinaciones peligrosas, reducción de daño.',
    meta: '4 págs • A5 doblado • 2023', tags: ['MDMA', 'éxtasis', 'dosis']
  },
  {
    id: 'suplemento-cocaina', category: 'suplemento', title: 'Suplemento: Cocaína',
    desc: 'Rutas administración, efectos cardiovasculares, primeros auxilios.',
    meta: '4 págs • A5 doblado • 2023', tags: ['cocaína', 'cardio', 'riesgos']
  },
  {
    id: 'suplemento-lsd', category: 'suplemento', title: 'Suplemento: LSD/Psicodélicos',
    desc: 'Experiencia, setting, bad trips, gestión emocional, recomendaciones.',
    meta: '4 págs • A5 doblado • 2023', tags: ['LSD', 'psicodélicos', 'bad-trip']
  },
  {
    id: 'suplemento-alcohol', category: 'suplemento', title: 'Suplemento: Alcohol',
    desc: 'Mezclas riesgosas, deshidratación, primeros auxilios básicos.',
    meta: '4 págs • A5 doblado • 2023', tags: ['alcohol', 'mezclas', 'deshidratación']
  },
  {
    id: 'suplemento-mescalina', category: 'suplemento', title: 'Suplemento: Mescalina/Cactus',
    desc: 'Cactus activos, preparación, efectos prolongados, setting importante.',
    meta: '4 págs • A5 doblado • 2023', tags: ['mescalina', 'cactus', 'naturales']
  }
];

let filteredMaterials = [...materials];

function createCardHTML(m) {
  const tagHTML = m.tags.map(t => `<span style="background:rgba(45,90,74,.3);color:#e8e8e8;padding:2px 6px;border-radius:2px;font-size:10px;margin-right:4px">${t}</span>`).join('');
  
  return `
    <div class="card" onclick="openModal('${m.id}')">
      <div class="card-preview" style="background:linear-gradient(135deg,#0d0d0d,#151515);border:1px dashed #2a2a2a">
        <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
          <rect x="8" y="12" width="44" height="36" rx="2" stroke="#2d5a4a" stroke-width="2"/>
          <text x="30" y="35" font-size="9" fill="#675f55" text-anchor="middle" font-weight="600">${m.category.toUpperCase()}</text>
        </svg>
      </div>
      <div class="card-title">${m.title}</div>
      <div class="card-meta">${m.meta}</div>
      <div class="card-desc">${m.desc}</div>
      <div class="card-actions">
        <button class="btn-sm btn-accent" onclick="event.stopPropagation()">Detalles</button>
        <button class="btn-sm" onclick="event.stopPropagation()">Descargar</button>
      </div>
    </div>
  `;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filt = document.getElementById('filterType').value;

  filteredMaterials = materials.filter(m => {
    const matchesQ = !q || m.title.toLowerCase().includes(q) || m.desc.toLowerCase().includes(q) || m.tags.some(t => t.includes(q));
    const matchesF = !filt || m.category === filt;
    return matchesQ && matchesF;
  });

  const container = document.getElementById('container');
  if (filteredMaterials.length === 0) {
    container.innerHTML = `<div class="empty">
      <div>No se encontraron materiales</div>
      <div style="font-size:11px;margin-top:8px">Intenta otra búsqueda o resetea filtros</div>
    </div>`;
    return;
  }

  let html = '';
  const byCat = {};
  filteredMaterials.forEach(m => {
    if (!byCat[m.category]) byCat[m.category] = [];
    byCat[m.category].push(m);
  });

  const catLabels = { flyer: 'Flyers Educativos', rider: 'Riders Operativos', signage: 'Señalización', suplemento: 'Suplementos' };
  Object.keys(byCat).sort().forEach(cat => {
    html += `<h3 class="section-title">${catLabels[cat] || cat}</h3>`;
    html += `<div class="grid">`;
    byCat[cat].forEach(m => { html += createCardHTML(m); });
    html += `</div>`;
  });

  container.innerHTML = html;
}

function setFilter(f) {
  document.getElementById('filterType').value = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (f) event.target.classList.add('active');
  else document.querySelectorAll('.filter-btn')[0].classList.add('active');
  render();
}

function openModal(id) {
  const m = materials.find(x => x.id === id);
  if (!m) return;
  
  const tagHTML = m.tags.map(t => `<span style="background:#2d5a4a;color:#fff;padding:3px 8px;border-radius:3px;font-size:10px;margin-right:4px">${t}</span>`).join('');
  
  const body = `
    <div class="modal-title">${m.title}</div>
    <div class="modal-info">Categoría: <strong>${m.category}</strong> | ${m.meta}</div>
    <div class="modal-info">Tags: ${tagHTML || '<em>sin tags</em>'}</div>
    <div style="margin:16px 0;padding:14px;background:#1a1a1a;border-radius:4px;border-left:3px solid #2d5a4a;font-size:13px;line-height:1.5">
      ${m.desc}
    </div>
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid #2a2a2a;font-size:12px;color:#888">
      <div>Archivo: <code style="background:#0a0a0a;padding:2px 4px;border-radius:2px;font-family:monospace">${m.id}.pdf</code></div>
      <div style="margin-top:6px">Ubicación: <code style="background:#0a0a0a;padding:2px 4px;border-radius:2px;font-family:monospace">/svg/rd/${m.category}/${m.id}</code></div>
    </div>
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn-sm btn-accent" onclick="alert('Descargando...')">Descargar PDF</button>
      <button class="btn-sm" onclick="alert('Vista previa SVG...')">Vectorizado</button>
    </div>
  `;
  
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

function reloadData() {
  alert('Recargando desde servidor...');
  // En producción aquí iría fetch a backend
}

document.getElementById('search').addEventListener('input', render);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

render();
</script>
</body>
</html>
